<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rashadtech Cleanup Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #141420;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #2a2a3a;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #e50914;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a2a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        input:focus {
            border-color: #e50914;
        }
        .info-box {
            background: #1a1a2a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
        }
        .info-box li {
            margin: 6px 0;
            padding-left: 16px;
            position: relative;
        }
        .info-box li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #e50914;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger {
            background: #e50914;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c40812;
        }
        .btn-danger:disabled {
            background: #444;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .result.success {
            background: rgba(0, 200, 100, 0.15);
            border: 1px solid rgba(0, 200, 100, 0.3);
            color: #00c864;
        }
        .result.error {
            background: rgba(229, 9, 20, 0.15);
            border: 1px solid rgba(229, 9, 20, 0.3);
            color: #e50914;
        }
        .warning {
            color: #ff9800;
            font-size: 12px;
            margin-top: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Data Cleanup</h1>
        <p class="subtitle">Clear all test data and start fresh</p>
        
        <div class="info-box">
            <strong style="color:#fff;display:block;margin-bottom:10px;">This will remove:</strong>
            <ul>
                <li>All stock Netflix accounts</li>
                <li>All customer subscriptions</li>
                <li>All transaction history</li>
                <li>All wallet balances</li>
                <li>All stored verification codes</li>
            </ul>
        </div>
        
        <div class="form-group">
            <label>API Secret</label>
            <input type="password" id="apiSecret" placeholder="Enter your API_SECRET">
        </div>
        
        <button class="btn btn-danger" id="cleanupBtn" onclick="doCleanup()">
            🚀 Clear All Data
        </button>
        
        <div class="result" id="result"></div>
        
        <p class="warning">⚠️ This action cannot be undone!</p>
    </div>

    <script>
        // Get server URL from query params or use default
        const serverUrl = 'https://rashadtech-api.onrender.com';
        
        if (urlParams.get('server')) {
            document.getElementById('apiSecret').focus();
        }
        
        async function doCleanup() {
            const secret = document.getElementById('apiSecret').value.trim();
            const btn = document.getElementById('cleanupBtn');
            const result = document.getElementById('result');
            
            if (!secret) {
                result.className = 'result error';
                result.style.display = 'block';
                result.textContent = '❌ Please enter your API Secret';
                return;
            }
            
            if (!serverUrl) {
                result.className = 'result error';
                result.style.display = 'block';
                result.textContent = '❌ Please provide server URL in URL parameters: ?server=YOUR_URL';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Clearing...';
            
            try {
                const res = await fetch(`${serverUrl}/clear-all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    result.className = 'result success';
                    result.textContent = '✅ All data cleared successfully!';
                    btn.textContent = '✓ Cleared!';
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            } catch (e) {
                result.className = 'result error';
                result.textContent = '❌ Error: ' + e.message;
                btn.disabled = false;
                btn.textContent = '🚀 Clear All Data';
            }
            
            result.style.display = 'block';
        }
    </script>
</body>
</html>
