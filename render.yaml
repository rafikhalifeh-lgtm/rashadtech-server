# Optional Render Blueprint — add a cron job in the Render dashboard if this file is not used.
# Web service (rashadtech-server): set Health Check Path to /ping in the Render dashboard.
# Keeps the web service warm by pinging /ping every 3 minutes.
services:
  - type: cron
    name: rashadtech-keep-awake
    schedule: "*/3 * * * *"
    buildCommand: "echo keep-awake"
    startCommand: "curl -fsS https://rashadtech-server.onrender.com/ping || true"
