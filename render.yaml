# Render Blueprint (optional). If the web service was created manually in the dashboard,
# set Health Check Path to /ping and Build Command to npm install && npm run build.
services:
  - type: web
    name: rashadtech-server
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_VERSION
        value: "22"
  - type: cron
    name: rashadtech-keep-awake
    schedule: "*/3 * * * *"
    buildCommand: "echo keep-awake"
    startCommand: "curl -fsS https://rashadtech-server.onrender.com/ping || true"
